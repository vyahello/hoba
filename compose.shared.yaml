# Production override for SHARED VPS deployment.
#
# Use this when the box already has a public-facing reverse proxy
# (nginx, Caddy, Traefik) terminating TLS for other sites, and you
# want Hoba to slot in behind it on a subdomain rather than taking
# ports 80/443.
#
# Usage:
#   docker compose -f docker-compose.yml -f compose.shared.yaml up -d
#
# Effects:
#   * `webapp` is built with the multi-stage Dockerfile's `prod`
#     target — an in-container nginx serving a pre-built static
#     bundle. No Vite at runtime, no HMR, no allowedHosts surprises.
#   * `api` + `webapp` + `redis` ports bind to 127.0.0.1 only — not
#     reachable from the public internet, only from the host's
#     reverse proxy.
#   * `caddy` is disabled (the existing reverse proxy handles TLS).
#   * Dev-only source bind mounts are reset on `webapp` so the prod
#     static bundle isn't shadowed by mounting the source tree.
#
# The `!override` tag is critical — without it, Compose APPENDS the
# host bindings here to the base file's "8000:8000" / "5173:5173" /
# "6379:6379" entries instead of replacing them, and the containers
# end up bound on both 0.0.0.0 and 127.0.0.1.

services:
  api:
    ports: !override
      - "127.0.0.1:8800:8000"

  webapp:
    build:
      context: ./apps/webapp
      target: prod
      args:
        VITE_TELEGRAM_BOT_USERNAME: ${VITE_TELEGRAM_BOT_USERNAME:-hobagame_bot}
        VITE_TELEGRAM_APP_SHORT_NAME: ${VITE_TELEGRAM_APP_SHORT_NAME:-}
    # The prod container is `nginx:1.27-alpine` serving on port 80 —
    # not Vite on 5173. The host-side port (5800) is unchanged so the
    # host nginx config in infra/nginx/hoba.conf keeps proxying there.
    ports: !override
      - "127.0.0.1:5800:80"
    # Dev profile bind-mounts the source tree into /app so Vite picks
    # up live edits. Prod has nothing to read from /app — its content
    # lives at /usr/share/nginx/html, baked in during build. Reset
    # the volumes list so nothing accidentally shadows the bundle.
    volumes: !override []
    # Vite-only env vars also irrelevant at prod runtime. Build-time
    # values come through `build.args` above.
    environment: !override {}

  redis:
    ports: !override
      - "127.0.0.1:6800:6379"

  # Disable the bundled Caddy — the host's existing reverse proxy
  # is doing TLS termination.
  caddy:
    profiles: ["disabled"]
