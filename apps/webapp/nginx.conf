# In-container nginx serving the static SPA bundle.
#
# In dev this file is unused (the `dev` Docker target runs Vite, not
# nginx). In prod it's mounted at /etc/nginx/conf.d/default.conf by
# the Dockerfile's `prod` stage and listens on port 80 inside the
# container. The host's reverse proxy terminates TLS and routes the
# Hoba subdomain here.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Vite emits hashed assets under /assets/ (e.g. /assets/index-abc123.js).
    # These are immutable for the life of the build — cache forever; the
    # browser will only re-fetch them when index.html references new
    # hashes after a redeploy.
    location ~* ^/assets/.*\.(js|mjs|css|woff2?|ttf|otf|png|jpe?g|gif|svg|webp|ico|mp3|wav|json|map)$ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — every client-side route (/spin/:id, /room/:CODE,
    # /create, /library, /settings) needs to serve index.html so React
    # Router can take over from there.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # The HTML shell itself must NOT cache, otherwise users keep the
    # old version's asset hashes pinned forever after a redeploy.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
    }

    # Container-level health check for orchestrators that want one.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
