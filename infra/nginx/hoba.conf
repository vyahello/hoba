# Nginx server block for Hoba! behind a shared-VPS reverse proxy.
#
# Copy to /etc/nginx/sites-available/hoba, then:
#   sudo ln -s /etc/nginx/sites-available/hoba /etc/nginx/sites-enabled/hoba
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# Prereqs:
#   * DNS A-record for hoba.<your-domain> → VPS public IP
#   * TLS cert via certbot:
#       sudo certbot --nginx -d hoba.<your-domain>
#   * Hoba containers running with compose.shared.yaml override —
#     api on 127.0.0.1:8800, webapp on 127.0.0.1:5800. Host ports
#     are deliberately offset from the in-container ones (8000/5173)
#     so they don't clash with whatever else is on the box (e.g. a
#     pre-existing service on 8000).

server {
    listen 80;
    listen [::]:80;
    server_name hoba.example.com;   # ← REPLACE with your actual subdomain

    # Redirect everything to HTTPS. certbot rewrites this block
    # once it issues the cert, so you may end up with `return 301
    # https://$host$request_uri;` already in here after certbot.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hoba.example.com;   # ← REPLACE with your actual subdomain

    # certbot fills these in. If you're hand-managing the cert:
    #   ssl_certificate     /etc/letsencrypt/live/hoba.<your-domain>/fullchain.pem;
    #   ssl_certificate_key /etc/letsencrypt/live/hoba.<your-domain>/privkey.pem;

    # Modest body cap — wheels are tiny JSON. Spec §14 already
    # bounds counts, so we don't need megabytes here.
    client_max_body_size 64k;

    # ----- Drop automated vulnerability scanners ----------------------
    # Bots constantly probe for WordPress/PHP/secret files (wp-admin,
    # xmlrpc.php, wlwmanifest.xml, .env, .git/). None exist here, but
    # the SPA fallback would otherwise answer 200 with index.html —
    # which advertises a live host and floods the access log. 444 makes
    # nginx close the connection with no response and minimal logging.
    location ~* (?:wp-includes|wp-admin|wp-login|xmlrpc\.php|wlwmanifest|\.env$|\.git/|\.aws/|/vendor/) {
        return 444;
    }

    # ----- REST API ----------------------------------------------------
    location /api/ {
        proxy_pass http://127.0.0.1:8800;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }

    # FastAPI interactive docs are NOT exposed in prod — they would leak
    # the full API surface (every route, schema, and example) to anyone.
    # Block /docs, /redoc, and /openapi.json at the edge. If you need them
    # for debugging, do it over the localhost-bound container port
    # (127.0.0.1:8800) via an SSH tunnel, not the public subdomain.
    location ~ ^/(?:docs|redoc|openapi\.json)(?:/.*)?$ {
        return 404;
    }

    # ----- Socket.IO realtime ----------------------------------------
    # Long-lived connection: keep-alive + WebSocket upgrade + a
    # generous read timeout so idle rooms don't get reaped.
    location /socket.io/ {
        proxy_pass http://127.0.0.1:8800;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ----- Webapp (Vite dev server) -----------------------------------
    # Catch-all: Vite serves the React Mini App + handles its own
    # asset paths. HMR uses WebSockets — same upgrade headers as
    # Socket.IO above. (HMR doesn't hit prod users, but it keeps
    # local-via-tunnel previews working too.)
    location / {
        proxy_pass http://127.0.0.1:5800;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }
}
