name: ci

on:
  push:
    branches: [main]
  pull_request:

# Phase 1 stub: validates config files and structure. Real lint / typecheck /
# pytest jobs are wired up incrementally from Phase 2 onwards as each package
# gains real code.

jobs:
  validate-compose:
    name: validate docker-compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: docker compose config
        run: |
          cp .env.example .env
          docker compose config --quiet

  validate-python:
    name: validate Python projects
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [apps/api, apps/bot]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install uv
        run: pip install --no-cache-dir uv
      - name: validate pyproject.toml
        working-directory: ${{ matrix.package }}
        run: python -c "import tomllib, pathlib; tomllib.loads(pathlib.Path('pyproject.toml').read_text())"
      - name: install hoba-api (required by hoba-bot at import time)
        if: matrix.package == 'apps/bot'
        run: uv pip install --system -e apps/api
      - name: install package
        working-directory: ${{ matrix.package }}
        run: uv pip install --system -e ".[dev]"
      - name: ruff
        working-directory: ${{ matrix.package }}
        run: ruff check .
      - name: mypy
        working-directory: ${{ matrix.package }}
        run: mypy --strict src
      - name: pytest
        working-directory: ${{ matrix.package }}
        run: pytest -q

  validate-webapp:
    name: validate webapp
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # pnpm/action-setup@v4 reads the pnpm version from package.json's
      # `packageManager` field (pnpm@9.15.0). Specifying `version:` here
      # too is rejected with ERR_PNPM_BAD_PM_VERSION — leave it implicit.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: install
        working-directory: apps/webapp
        run: pnpm install --no-frozen-lockfile
      - name: typecheck
        working-directory: apps/webapp
        run: pnpm run typecheck
      - name: lint
        working-directory: apps/webapp
        run: pnpm run lint
      - name: test
        working-directory: apps/webapp
        run: pnpm run test

  deploy:
    name: Deploy to VPS
    needs: [validate-compose, validate-python, validate-webapp]
    # Only a real push to main — never PRs/forks; blocked unless every
    # validate job above is green (needs:).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-vps
      cancel-in-progress: false
    steps:
      - name: Deploy over SSH (sync main + run deploy.sh)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            APP_DIR="${{ secrets.VPS_APP_DIR }}"
            APP_DIR="${APP_DIR:-$HOME/hoba}"
            REPO="${{ secrets.REPO_SSH_URL }}"
            REPO="${REPO:-git@github.com:vyahello/hoba.git}"
            # Set up a git checkout in place (works for a fresh dir or a
            # pre-existing/rsynced one).
            if [ ! -d "$APP_DIR/.git" ]; then
              echo "No git checkout in $APP_DIR — initialising one"
              mkdir -p "$APP_DIR"
              git init -q "$APP_DIR"
              git -C "$APP_DIR" remote add origin "$REPO" 2>/dev/null \
                || git -C "$APP_DIR" remote set-url origin "$REPO"
            fi
            cd "$APP_DIR"
            git fetch --prune origin
            # .env + data/ are gitignored, so reset --hard leaves them intact.
            git reset --hard origin/main
            # The tree is already synced above — skip the script's own pull.
            bash "$APP_DIR/scripts/deploy.sh" --no-pull
